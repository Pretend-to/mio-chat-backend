<!DOCTYPE html>
<!-- ==================================================================
     DEPLOY NOTIFICATION · Kami Design System · Email Edition
     Warm parchment, ink-blue accent, serif hierarchy
     ================================================================== -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="generator" content="Kami">
<title>{{TITLE}}</title>
<style>
  /* ============================================================
     Kami Design System — Email
     Invariants:
       - Background: #f5f4ed parchment, never pure white
       - Accent:     #1B365D ink-blue, ≤ 5% surface area
       - Grays:      warm-toned (yellow-brown undertone)
       - Font:       serif for everything
       - Tags:       solid #E4ECF5, never rgba
       - Shadows:    whisper, never hard drop shadows
       - Dividers:   2.5pt brand left bar | 0.5pt warm-gray dotted
     ============================================================ */

  /* --- Reset --- */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --parchment:  #f5f4ed;
    --ivory:      #faf9f5;
    --sand:       #e8e6dc;
    --near-black: #141413;
    --dark-warm:  #3d3d3a;
    --olive:      #504e49;
    --stone:      #6b6a64;
    --brand:      #1B365D;
    --brand-light:#2D5A8A;
    --border:     #e8e6dc;
    --border-soft:#e5e3d8;
    --tag-bg:     #E4ECF5;

    --serif: Georgia, Palatino, "Times New Roman", "Songti SC", "SimSun", serif;
    --sans:  var(--serif);
  }

  /* --- Wrapper (email-safe background) --- */
  .email-wrapper {
    background-color: #f5f4ed;
    padding: 24px 0;
    font-family: var(--serif);
  }

  .email-container {
    max-width: 580px;
    margin: 0 auto;
    background-color: #faf9f5;   /* ivory, not white */
    border: 0.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);  /* whisper shadow */
  }

  /* ============================================================
     HEADER — ink-blue band, white text
     Left accent bar simulated via border-left
     ============================================================ */
  .email-header {
    background-color: var(--brand);
    padding: 26px 28px 22px 28px;
    border-bottom: 0;
  }

  .header-status {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 10px;
    font-family: var(--serif);
  }

  .header-status.success {
    background-color: #E8F5EE;
    color: #2D6A4F;
  }

  .header-status.error {
    background-color: #FDE8E8;
    color: #9B2226;
  }

  .email-header h1 {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    color: #ffffff;
    line-height: 1.3;
    letter-spacing: -0.1px;
  }

  .email-header .header-meta {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.65);
    margin-top: 3px;
    font-family: var(--serif);
  }

  /* ============================================================
     BODY — warm ivory container
     ============================================================ */
  .email-body {
    padding: 24px 28px 20px 28px;
  }

  /* --- Info grid (table-based for email safety) --- */
  .info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }

  .info-table tr td {
    padding: 5px 0;
    vertical-align: top;
    font-family: var(--serif);
  }

  .info-table .label {
    width: 68px;
    font-size: 10px;
    color: var(--stone);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding-right: 14px;
    font-weight: 500;
  }

  .info-table .value {
    font-size: 14px;
    color: var(--near-black);
    line-height: 1.45;
  }

  .info-table .value .branch-badge {
    display: inline-block;
    background-color: #E4ECF5;   /* solid hex tag */
    color: var(--brand);
    padding: 1px 9px;
    border-radius: 2px;
    font-size: 11px;
    font-family: var(--serif);
  }

  .info-table .value .pusher-avatar {
    display: inline-block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background-color: var(--brand);
    color: #fff;
    text-align: center;
    line-height: 18px;
    font-size: 9px;
    font-weight: 500;
    margin-right: 5px;
    vertical-align: middle;
  }

  /* --- Accent left bar divider (Kami signature) --- */
  .accent-divider {
    height: 0;
    border: none;
    border-top: 0.5px dotted var(--border);
    margin: 18px 0;
  }

  /* --- Commit card (left bar style) --- */
  .commit-card {
    background-color: #f5f4ed;    /* parchment */
    border-left: 2.5px solid var(--brand);
    border-radius: 2px;
    padding: 12px 14px;
    margin: 18px 0;
  }

  .commit-card .commit-eyebrow {
    font-size: 9px;
    color: var(--stone);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-family: var(--serif);
  }

  .commit-card .commit-message {
    font-size: 14px;
    color: var(--near-black);
    line-height: 1.4;
    font-weight: 500;
    font-family: var(--serif);
  }

  .commit-card .commit-link {
    display: inline-block;
    margin-top: 7px;
    font-size: 11px;
    color: var(--brand-light);
    text-decoration: none;
    font-family: var(--serif);
  }

  .commit-card .commit-link:hover {
    text-decoration: underline;
  }

  /* --- Log block (mono) --- */
  .log-label {
    font-size: 9px;
    color: var(--stone);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 7px;
    font-family: var(--serif);
  }

  .log-block {
    background-color: #f2f0e8;    /* warm, one step darker than parchment */
    border: 0.5px solid var(--border-soft);
    border-radius: 3px;
    padding: 11px 13px;
    font-family: "Menlo", "Monaco", "Courier New", monospace;
    font-size: 10.5px;
    line-height: 1.5;
    color: var(--dark-warm);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 180px;
    overflow-y: auto;
    margin: 0;
  }

  .log-block.is-error {
    background-color: #FDE8E8;
    border-color: #f5c6cb;
    color: #9B2226;
  }

  /* ============================================================
     FOOTER
     ============================================================ */
  .email-footer {
    padding: 14px 28px 18px 28px;
    border-top: 0.5px dotted var(--border);
    text-align: center;
  }

  .email-footer .footer-time {
    font-size: 10px;
    color: var(--olive);
    margin-bottom: 2px;
    font-family: var(--serif);
  }

  .email-footer .footer-brand {
    font-size: 9px;
    color: var(--stone);
    letter-spacing: 0.6px;
    font-family: var(--serif);
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media screen and (max-width: 480px) {
    .email-header { padding: 20px 18px 16px 18px; }
    .email-body   { padding: 18px 18px 16px 18px; }
    .email-footer { padding: 12px 18px 14px 18px; }
    .email-header h1 { font-size: 16px; }
    .info-table .label { display: block; width: auto; padding-bottom: 0; }
    .info-table .value { display: block; padding-top: 2px; padding-bottom: 8px; }
  }
</style>
</head>
