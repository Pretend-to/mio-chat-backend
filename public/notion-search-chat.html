<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mio Search — 联网搜索聊天助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================
     CSS Variables — Notion-inspired Palette
     ============================================ */
  :root {
    --bg-page: #ffffff;
    --bg-sidebar: #f7f7f7;
    --bg-hover: #efefef;
    --bg-active: #e8e8e8;
    --bg-card: #ffffff;
    --bg-input: #f1f1f1;
    --bg-user-msg: #e8f1ff;
    --bg-ai-msg: #f8f8f8;
    --bg-search-on: #e8f5e9;
    --bg-code: #f4f4f5;
    --border-light: #e9e9e9;
    --border-medium: #d4d4d4;
    --text-primary: #1a1a2e;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --text-placeholder: #b5b5b5;
    --accent-blue: #2367e0;
    --accent-blue-hover: #1a56c9;
    --accent-green: #2ea043;
    --accent-orange: #f5a623;
    --accent-red: #e03e3e;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, 'Apple Color Emoji', Arial, sans-serif;
    --font-mono: 'IBM Plex Mono', 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    --sidebar-width: 280px;
    --header-height: 52px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ============================================
     Reset & Base
     ============================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ============================================
     Scrollbar
     ============================================ */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #b0b0b0; }

  /* ============================================
     Sidebar
     ============================================ */
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    height: 100vh;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
    transition: transform var(--transition), opacity var(--transition);
    position: relative;
    z-index: 100;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    text-decoration: none;
  }

  .sidebar-logo svg {
    flex-shrink: 0;
  }

  .sidebar-header-actions {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: background var(--transition), color var(--transition);
  }

  .icon-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  .icon-btn svg { width: 18px; height: 18px; }

  /* Search in sidebar */
  .sidebar-search {
    padding: 10px 14px;
    flex-shrink: 0;
  }

  .sidebar-search-input {
    width: 100%;
    padding: 8px 12px 8px 36px;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    background: var(--bg-input);
    font-family: var(--font-sans);
    font-size: 0.85rem;
    color: var(--text-primary);
    outline: none;
    transition: background var(--transition), border-color var(--transition);
  }

  .sidebar-search-input::placeholder { color: var(--text-placeholder); }
  .sidebar-search-input:focus {
    background: var(--bg-card);
    border-color: var(--accent-blue);
  }

  .sidebar-search-wrap {
    position: relative;
  }

  .sidebar-search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    pointer-events: none;
    display: flex;
  }

  .sidebar-search-icon svg { width: 15px; height: 15px; }

  /* Page list */
  .sidebar-pages {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px 12px;
  }

  .sidebar-section-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-tertiary);
    padding: 10px 10px 4px;
  }

  .sidebar-page-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background var(--transition);
    font-size: 0.85rem;
    color: var(--text-secondary);
    text-decoration: none;
    position: relative;
  }

  .sidebar-page-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .sidebar-page-item.active {
    background: var(--bg-active);
    color: var(--text-primary);
    font-weight: 500;
  }

  .sidebar-page-item .page-icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .sidebar-page-item .page-title {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-page-item .page-badge {
    font-size: 0.65rem;
    background: var(--bg-hover);
    padding: 1px 6px;
    border-radius: 10px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }

  .sidebar-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border-light);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-footer-avatar {
    width: 26px;
    height: 26px;
    border-radius: 4px;
    background: var(--accent-blue);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    flex-shrink: 0;
  }

  .sidebar-footer-text {
    flex: 1;
    font-size: 0.8rem;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ============================================
     Main Area
     ============================================ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    min-width: 0;
    background: var(--bg-page);
  }

  /* Header */
  .main-header {
    height: var(--header-height);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
    background: var(--bg-page);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .menu-toggle {
    display: none;
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: background var(--transition);
  }

  .menu-toggle:hover { background: var(--bg-hover); }

  .main-header-title {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .main-header-title .breadcrumb-sep {
    color: var(--text-tertiary);
    font-weight: 400;
  }

  .main-header-spacer { flex: 1; }

  /* Search Toggle */
  .search-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-light);
    background: transparent;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.8rem;
    color: var(--text-secondary);
    transition: all var(--transition);
    white-space: nowrap;
  }

  .search-toggle:hover {
    border-color: var(--border-medium);
    background: var(--bg-hover);
  }

  .search-toggle.active {
    background: #e6f7ec;
    border-color: var(--accent-green);
    color: #1a7f3a;
  }

  .search-toggle .toggle-dot {
    width: 18px;
    height: 10px;
    border-radius: 5px;
    background: #ccc;
    position: relative;
    transition: background var(--transition);
    flex-shrink: 0;
  }

  .search-toggle .toggle-dot::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 1px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: white;
    transition: transform var(--transition);
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }

  .search-toggle.active .toggle-dot {
    background: var(--accent-green);
  }
  .search-toggle.active .toggle-dot::after {
    transform: translateX(8px);
  }

  .search-toggle .toggle-label {
    font-weight: 500;
  }

  .header-new-chat {
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.8rem;
    color: var(--text-secondary);
    transition: all var(--transition);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .header-new-chat:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  /* ============================================
     Chat Area
     ============================================ */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 16px;
    scroll-behavior: smooth;
  }

  .chat-messages-inner {
    max-width: 740px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Welcome screen */
  .welcome-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 40px;
    text-align: center;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #2367e0, #1a56c9);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    color: white;
    box-shadow: 0 4px 16px rgba(35,103,224,0.2);
  }

  .welcome-title {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  .welcome-sub {
    font-size: 0.9rem;
    color: var(--text-secondary);
    max-width: 400px;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .welcome-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
  }

  .welcome-suggestion {
    padding: 8px 16px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.82rem;
    color: var(--text-secondary);
    transition: all var(--transition);
  }

  .welcome-suggestion:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: #f5f8ff;
    box-shadow: var(--shadow-sm);
  }

  /* Message */
  .message {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    animation: msgFadeIn 0.3s ease-out both;
  }

  @keyframes msgFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 0.8rem;
    margin-top: 2px;
  }

  .message-avatar.user {
    background: #e8f1ff;
    color: var(--accent-blue);
  }

  .message-avatar.ai {
    background: #1a1a2e;
    color: white;
  }

  .message-avatar.search {
    background: #e6f7ec;
    color: var(--accent-green);
  }

  .message-body {
    flex: 1;
    min-width: 0;
  }

  .message-name {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-tertiary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .message-content {
    font-size: 0.93rem;
    line-height: 1.65;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message-content p {
    margin-bottom: 10px;
  }

  .message-content p:last-child { margin-bottom: 0; }

  .message-content ul, .message-content ol {
    margin: 6px 0 6px 20px;
  }

  .message-content li { margin-bottom: 4px; }

  .message-content strong {
    font-weight: 600;
  }

  .message-content code {
    font-family: var(--font-mono);
    font-size: 0.82em;
    background: var(--bg-code);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .message-content pre {
    background: var(--bg-code);
    padding: 14px 16px;
    border-radius: var(--radius-md);
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    line-height: 1.5;
    margin: 10px 0;
  }

  /* Search result card */
  .search-result-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    margin: 8px 0;
    transition: box-shadow var(--transition);
  }

  .search-result-card:hover {
    box-shadow: var(--shadow-sm);
  }

  .search-result-card .result-title {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--accent-blue);
    margin-bottom: 4px;
    cursor: pointer;
  }

  .search-result-card .result-title:hover {
    text-decoration: underline;
  }

  .search-result-card .result-url {
    font-size: 0.75rem;
    color: var(--accent-green);
    margin-bottom: 6px;
  }

  .search-result-card .result-snippet {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Stream cursor */
  .stream-cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--accent-blue);
    margin-left: 2px;
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* ============================================
     Input Area
     ============================================ */
  .input-area {
    padding: 12px 24px 20px;
    flex-shrink: 0;
    border-top: 1px solid var(--border-light);
    background: var(--bg-page);
  }

  .input-wrap {
    max-width: 740px;
    margin: 0 auto;
    position: relative;
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 8px 8px 8px 16px;
    transition: border-color var(--transition), box-shadow var(--transition);
    box-shadow: var(--shadow-sm);
  }

  .input-box:focus-within {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px rgba(35,103,224,0.1);
  }

  .input-box textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-sans);
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text-primary);
    background: transparent;
    max-height: 150px;
    min-height: 24px;
    padding: 4px 0;
  }

  .input-box textarea::placeholder {
    color: var(--text-placeholder);
  }

  .input-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    padding-bottom: 2px;
  }

  .input-action-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
    transition: all var(--transition);
  }

  .input-action-btn:hover {
    background: var(--bg-hover);
    color: var(--text-secondary);
  }

  .input-action-btn svg { width: 18px; height: 18px; }

  .send-btn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--accent-blue);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: var(--accent-blue-hover);
    transform: scale(1.04);
  }

  .send-btn:active {
    transform: scale(0.96);
  }

  .send-btn:disabled {
    background: #d0d0d0;
    cursor: not-allowed;
    transform: none;
  }

  .send-btn svg { width: 18px; height: 18px; }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 4px 0;
    font-size: 0.72rem;
    color: var(--text-tertiary);
  }

  .input-footer .search-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .input-footer .search-indicator.active {
    color: var(--accent-green);
  }

  /* ============================================
     Loading / Typing indicator
     ============================================ */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 0;
  }

  .typing-indicator .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ccc;
    animation: typingDot 1.4s ease-in-out infinite;
  }

  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 60%, 100% { opacity: 0.4; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.2); background: var(--accent-blue); }
  }

  /* ============================================
     Mobile Overlay
     ============================================ */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 99;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .sidebar-overlay.show {
    opacity: 1;
  }

  /* ============================================
     Responsive
     ============================================ */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      transform: translateX(-100%);
      z-index: 100;
      box-shadow: var(--shadow-lg);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .menu-toggle {
      display: flex;
    }

    .sidebar-overlay {
      display: block;
    }

    .chat-messages-inner {
      padding: 0 16px;
    }

    .input-area {
      padding: 10px 16px 16px;
    }

    .welcome-suggestions {
      flex-direction: column;
      align-items: stretch;
    }
  }

  @media (max-width: 480px) {
    .main-header {
      padding: 0 12px;
    }

    .search-toggle .toggle-label-short {
      display: inline;
    }
    .search-toggle .toggle-label-full {
      display: none;
    }
  }

  @media (min-width: 481px) {
    .search-toggle .toggle-label-short {
      display: none;
    }
    .search-toggle .toggle-label-full {
      display: inline;
    }
  }

  /* ============================================
     Utility
     ============================================ */
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

  <!-- ==========================================
       Sidebar Overlay (Mobile)
       ========================================== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ==========================================
       Sidebar
       ========================================== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="#" class="sidebar-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

  <script>
    (function() {
      'use strict';

      // --- DOM refs ---
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const menuToggle = document.getElementById('menuToggle');
      const searchToggle = document.getElementById('searchToggle');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const chatMessages = document.getElementById('chatMessages');
      const messagesInner = document.getElementById('messagesInner');
      const welcomeScreen = document.getElementById('welcomeScreen');
      const searchIndicator = document.getElementById('searchIndicator');
      const newChatBtn = document.getElementById('newChatBtn');
      const currentPageTitle = document.getElementById('currentPageTitle');
      const sidebarItems = document.querySelectorAll('.sidebar-page-item');
      const sidebarSearch = document.getElementById('sidebarSearch');
      const suggestionBtns = document.querySelectorAll('.welcome-suggestion');

      // --- State ---
      let isSearchEnabled = false;
      let isProcessing = false;
      let currentChatId = 'chat-1';

      // --- Sidebar Toggle ---
      function openSidebar() {
        sidebar.classList.add('open');
        overlay.classList.add('show');
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
      }

      menuToggle.addEventListener('click', openSidebar);
      overlay.addEventListener('click', closeSidebar);

      // --- Search Toggle ---
      searchToggle.addEventListener('click', function() {
        isSearchEnabled = !isSearchEnabled;
        this.classList.toggle('active', isSearchEnabled);
        searchIndicator.innerHTML = isSearchEnabled
          ? '<span style="color:#2ea043">●</span> 联网搜索已开启'
          : '<span>●</span> 联网搜索已关闭';
        searchIndicator.classList.toggle('active', isSearchEnabled);
      });

      // --- Sidebar Page Selection ---
      sidebarItems.forEach(item => {
        item.addEventListener('click', function(e) {
          e.preventDefault();
          sidebarItems.forEach(i => i.classList.remove('active'));
          this.classList.add('active');
          currentChatId = this.dataset.id;
          const title = this.querySelector('.page-title')?.textContent || '无标题';
          currentPageTitle.textContent = title;

          // Clear messages and show welcome for different chats
          clearChat();
          closeSidebar();

          // Show a brief toast-like feedback
          if (window.innerWidth < 768) closeSidebar();
        });
      });

      // --- Sidebar Search ---
      sidebarSearch.addEventListener('input', function() {
        const q = this.value.toLowerCase().trim();
        sidebarItems.forEach(item => {
          const title = item.querySelector('.page-title')?.textContent?.toLowerCase() || '';
          item.style.display = (!q || title.includes(q)) ? 'flex' : 'none';
        });
      });

      // --- New Chat ---
      newChatBtn.addEventListener('click', function() {
        clearChat();
        // Create a new sidebar item
        const count = document.querySelectorAll('.sidebar-page-item').length + 1;
        const newItem = document.createElement('a');
        newItem.className = 'sidebar-page-item active';
        newItem.dataset.id = 'chat-new-' + Date.now();
        newItem.innerHTML = `
          <span class="page-icon">💬</span>
          <span class="page-title">新对话 ${count}</span>
          <span class="page-badge">刚刚</span>
        `;
        newItem.addEventListener('click', function(e) {
          e.preventDefault();
          sidebarItems.forEach(i => i.classList.remove('active'));
          document.querySelectorAll('.sidebar-page-item').forEach(i => i.classList.remove('active'));
          this.classList.add('active');
          currentChatId = this.dataset.id;
          currentPageTitle.textContent = this.querySelector('.page-title').textContent;
          clearChat();
          closeSidebar();
        });
        document.querySelector('.sidebar-section-label').after(newItem);
        sidebarItems.forEach(i => i.classList.remove('active'));
        currentPageTitle.textContent = `新对话 ${count}`;
        currentChatId = newItem.dataset.id;
        focusInput();
      });

      // --- Suggestion Click ---
      suggestionBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          const prompt = this.dataset.prompt;
          if (prompt) {
            chatInput.value = prompt;
            autoResize(chatInput);
            sendMessage();
          }
        });
      });

      // --- Auto-resize textarea ---
      function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 150) + 'px';
      }

      chatInput.addEventListener('input', function() {
        autoResize(this);
      });

      // --- Focus ---
      function focusInput() {
        chatInput.focus();
      }

      // --- Clear Chat ---
      function clearChat() {
        // Remove all messages except welcome
        const msgEls = messagesInner.querySelectorAll('.message');
        msgEls.forEach(el => el.remove());
        welcomeScreen.classList.remove('hidden');
        chatMessages.scrollTop = 0;
        isProcessing = false;
        sendBtn.disabled = false;
      }

      // --- Send message ---
      function sendMessage() {
        const text = chatInput.value.trim();
        if (!text || isProcessing) return;

        // Hide welcome
        welcomeScreen.classList.add('hidden');

        // Add user message
        addUserMessage(text);
        chatInput.value = '';
        autoResize(chatInput);

        isProcessing = true;
        sendBtn.disabled = true;

        // Scroll to bottom
        scrollToBottom();

        // If search is enabled, show search results first
        if (isSearchEnabled) {
          addSearchPhase(text);
        }

        // Simulate AI response
        simulateAIResponse(text);
      }

      // --- Add User Message ---
      function addUserMessage(text) {
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.innerHTML = `

          <div class="message-body">
            <div class="message-name">你</div>
            <div class="message-content">${escapeHtml(text)}</div>

        messagesInner.appendChild(msg);

      // --- Add AI Message (empty container for streaming) ---
      function addAIMessage() {
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.id = 'aiMessage-' + Date.now();
        msg.innerHTML = `

                <span class="dot"></span>
                <span class="dot"></span>

        messagesInner.appendChild(msg);

        return {

      // --- Add Search Phase ---
      function addSearchPhase(query) {
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.innerHTML = `
          <div class="message-avatar search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">

        messagesInner.appendChild(msg);

        // After a short delay, show results
        setTimeout(() => {
          const results = msg.querySelector('#searchResults');

      // --- Simulate AI Response ---
      function simulateAIResponse(userText) {
        const aiMsg = addAIMessage();
        const { contentEl } = aiMsg;

        let fullResponse = '';
        const responses = generateResponse(userText, isSearchEnabled);
        const words = responses.split(/(?<=\s)/);

        let idx = 0;
        const interval = setInterval(() => {
          if (idx < words.length) {
            fullResponse += words[idx];
            // Format with simple markdown-like rendering
            contentEl.innerHTML = formatMessage(fullResponse) + '<span class="stream-cursor"></span>';
            scrollToBottom();
            idx++;
          } else {
            clearInterval(interval);
            contentEl.innerHTML = formatMessage(fullResponse);
            isProcessing = false;
            sendBtn.disabled = false;
            scrollToBottom();
          }
        }, 20 + Math.random() * 30);
      }

      // --- Format message (simple markdown-like) ---
      function formatMessage(text) {
        // Code blocks
        text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
          const langClass = lang ? ` class="lang-${lang}"` : '';
          return `<pre${langClass}><code>${escapeHtml(code.trim())}</code></pre>`;
        });

        // Inline code
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

        // Bold
        text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

        // Italic
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');

        // Line breaks
        text = text.replace(/\n{2,}/g, '</p><p>');
        text = text.replace(/\n/g, '<br>');

        // Unordered lists
        text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
        text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

        // Task lists
        text = text.replace(/- \[ \] (.+)$/gm, '<li class="task unchecked">☐ $1</li>');
        text = text.replace(/- \[x\] (.+)$/gm, '<li class="task checked">☑ $1</li>');

        // Blockquote
        text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

        return `<p>${text}</p>`;
      }

      // --- Escape HTML ---
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // --- Scroll to bottom ---
      function scrollToBottom() {
        requestAnimationFrame(() => {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        if (e.key === 'Enter' && !e.shiftKey) {
